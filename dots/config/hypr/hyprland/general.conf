# =============================================================================
# MONITOR CONFIG
# =============================================================================
monitor=,preferred,auto,1

# =============================================================================
# GESTURES
# =============================================================================
gesture = 3, swipe, move,
gesture = 3, pinch, float
gesture = 4, horizontal, workspace
gesture = 4, up, dispatcher, global, quickshell:overviewWorkspacesToggle
gesture = 4, down, dispatcher, global, quickshell:overviewWorkspacesClose

gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

general {
    # Gaps and border
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50

    border_size = 1
    col.active_border = rgba(0DB7D455)
    col.inactive_border = rgba(31313600)
    resize_on_border = true

    no_focus_fallback = true

    allow_tearing = true # This just allows the `immediate` window rule to work

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
    # precise_mouse_move = true
}


decoration {
    rounding_power = 2
    rounding = 18

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 10
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 30
        offset = 0 3
        render_power = 4 # render_power 最大值为 4，原配置的 10 可能会报错
        color = rgba(00000027)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}


animations {
    enabled = true

    # --- 缓动曲线定义
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = elastic_snap, 0.4, 1.3, 0.25, 1.15 # 物理回弹
    bezier = quick_out, 0.3, 0, 0.1, 1

    # --- 窗口动画
    animation = windowsIn, 1, 6, elastic_snap, popin 80%
    animation = windowsOut, 1, 5, quick_out, popin 85%
    animation = windowsMove, 1, 6, fluent_decel, slide
    animation = border, 1, 12, fluent_decel

    # --- 图层动画
    animation = layersIn, 1, 5, fluent_decel, fade
    animation = layersOut, 1, 4, quick_out, fade

    # --- 渐变动画 ---
    animation = fadeIn, 1, 5, fluent_decel
    animation = fadeOut, 1, 5, fluent_decel

    # --- 工作区动画
    animation = workspaces, 1, 7.5, fluent_decel, slidefade 15%

    # --- 特殊工作区 ---
    animation = specialWorkspaceIn, 1, 6, elastic_snap, slidevert
    animation = specialWorkspaceOut, 1, 5, quick_out, slidevert

    # --- 缩放动画 ---
    animation = zoomFactor, 1, 5, fluent_decel
}


input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35

    follow_mouse = 1
    off_window_axis_events = 2
    sensitivity = 0  # 设置为 1.0 表示默认灵敏度
    accel_profile = flat  # flat 表示禁用加速，使用线性移动
    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.7
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = 1
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    session_lock_xray = true
    initial_workspace_tracking = false
    focus_on_activate = true
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

cursor {
    zoom_factor = 1
    zoom_rigid = false
    zoom_disable_aa = true
    hotspot_padding = 1
}
